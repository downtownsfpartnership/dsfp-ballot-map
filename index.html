<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSFP Ballot Tracking Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @font-face {
    font-family: 'Quasimoda';
    src: url('./Quasimoda-Medium.woff2') format('woff2');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252a38;
    --text: #e8eaf0;
    --text-muted: #6b7280;

    --green: #22c55e;
    --green-dark: #16a34a;
    --green-dim: rgba(34,197,94,0.15);

    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);

    --orange: #f59e0b;
    --orange-dark: #d97706;
    --orange-dim: rgba(245,158,11,0.15);

    --grey-fill: rgba(100,116,139,0.28);
    --grey-border: rgba(148,163,184,0.7);

    --blue-accent: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quasimoda', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .header-left {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  .subtitle {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .stat-value {
    font-family: 'Quasimoda', monospace;
    font-size: 18px;
    font-weight: 500;
    line-height: 1;
  }

  .stat-value.green { color: var(--green); }
  .stat-value.muted { color: var(--text-muted); }

  .stat-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  .progress-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 160px;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--green-dark));
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .progress-label {
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }

  .status-dot.live {
    background: var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.error {
    background: var(--red);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  #map {
    flex: 1;
    width: 100%;
  }

  .leaflet-tile-pane { filter: none; }

  .leaflet-control-attribution {
    background: rgba(15,17,23,0.85) !important;
    color: #4b5563 !important;
    font-size: 9px !important;
  }

  .leaflet-control-attribution a {
    color: #6b7280 !important;
  }

  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  .leaflet-control-zoom a:hover {
    background: var(--border) !important;
  }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: var(--text);
    font-family: 'Quasimoda', 'DM Sans', sans-serif;
  }

  .leaflet-popup-tip {
    background: var(--surface);
  }

  .leaflet-popup-content {
    margin: 14px 16px;
    min-width: 200px;
  }

  .popup-header {
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .popup-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 5px;
    font-size: 12px;
  }

  .popup-key {
    color: var(--text-muted);
  }

  .popup-val {
    color: var(--text);
    font-weight: 500;
    text-align: right;
    max-width: 160px;
    word-break: break-word;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-yes,
  .badge-city {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
  }

  .badge-no-explicit {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .badge-na {
    background: var(--orange-dim);
    color: var(--orange);
    border: 1px solid rgba(245,158,11,0.35);
  }

  .badge-pending {
    background: rgba(100,116,139,0.15);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 9999;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loader-label {
    font-family: 'Quasimoda', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-banner {
    display: none;
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5;
    font-family: 'Quasimoda', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 4px;
    z-index: 1000;
    max-width: 500px;
    text-align: center;
  }

  .legend {
    position: absolute;
    bottom: 24px;
    left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    z-index: 800;
    font-size: 11px;
  }

  .legend-title {
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .swatch-yes {
    background: rgba(34,197,94,0.55);
    border: 1.5px solid var(--green-dark);
  }

  .swatch-no {
    background: rgba(239,68,68,0.45);
    border: 1.5px solid var(--red);
  }

  .swatch-city {
    background: rgba(34,197,94,0.55);
    border: 1.5px solid var(--green-dark);
  }

  .swatch-na {
    background: rgba(245,158,11,0.45);
    border: 1.5px solid var(--orange-dark);
  }

  .swatch-pending {
    background: var(--grey-fill);
    border: 1.5px solid var(--grey-border);
  }

  .refresh-btn {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Quasimoda', monospace;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .refresh-btn:hover {
    background: var(--blue-accent);
    color: white;
    border-color: var(--blue-accent);
  }
</style>
</head>

<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loader-label" id="loadingMsg">Loading parcels…</div>
</div>

<div class="error-banner" id="errorBanner"></div>

<header>
  <div class="header-left">
    <h1>DSFP Ballot Tracking</h1>
    <span class="subtitle">BID Renewal &amp; Expansion</span>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value green" id="statSigned">—</span>
      <span class="stat-label">Signed</span>
    </div>

    <div class="stat">
      <span class="stat-value muted" id="statTotal">—</span>
      <span class="stat-label">Total Parcels</span>
    </div>

    <div class="stat">
      <span class="stat-value" id="statPct" style="color:#f59e0b;">—</span>
      <span class="stat-label">% Assessment</span>
    </div>

    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Loading…</span>
    </div>

    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-title">Ballot Status</div>
  <div class="legend-item"><div class="legend-swatch swatch-yes"></div>Yes</div>
  <div class="legend-item"><div class="legend-swatch swatch-no"></div>No</div>
  <div class="legend-item"><div class="legend-swatch swatch-city"></div>City Property</div>
  <div class="legend-item"><div class="legend-swatch swatch-na"></div>N/A</div>
  <div class="legend-item"><div class="legend-swatch swatch-pending"></div>Not yet voted</div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const GEOJSON_URL = "https://raw.githubusercontent.com/downtownsfpartnership/dsfp-ballot-map/main/MAP_3_19_Renewal_Expansion.geojson";
const SHEET_ID    = "1fN4u7AA5QQQNs5p4Zi9N2mJwpF3hhLTYVKlA3Q1k2zY";
const SHEET_GID   = "1106530303";

const BLKLOT_GEO  = "blklot";
const BLKLOT_SHT  = "blklot";
const STATUS_COL  = "2026 Ballot Vote";
  
const APN_OVERRIDES = {
  '0289003': '0289004'
};

function resolveLookupId(id) {
  return APN_OVERRIDES[id] || id;
}

// ── MAP INIT ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

let geojsonLayer = null;

// ── HELPERS ──────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

function setLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function cleanVal(v) {
  return String(v ?? '').replace(/^"|"$/g, '').replace(/^'|'$/g, '').trim();
}

function normalizeStatus(value) {
  const raw = cleanVal(value).toLowerCase();

  if (raw === 'yes' || raw === 'y') return 'yes';
  if (raw === 'no' || raw === 'n') return 'no';

  if (
    raw === 'city property' ||
    raw === 'city' ||
    raw === 'public property'
  ) {
    return 'city property';
  }

  if (
    raw === 'n/a' ||
    raw === 'na' ||
    raw === 'not applicable'
  ) {
    return 'n/a';
  }

  return 'pending';
}

// signedPct is a direct percentage value.
// Example: 15.41 means 15.41%.
function updateStats(signed, total, signedPct) {
  document.getElementById('statSigned').textContent = signed.toLocaleString();
  document.getElementById('statTotal').textContent  = total.toLocaleString();

  const pctDisplay = signedPct.toFixed(2) + '%';
  document.getElementById('statPct').textContent = pctDisplay;
}

// ── FETCH SHEET CSV ──────────────────────────────────────────────────────────
async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTxcvfFDuMncwINXVoJgBe49y0F5zxCjukptMb8NzuTVKkQJ47NDf7lZbwQ6jYWA1X7Tt_3X3kopzfZ/pub?gid=2002804202&single=true&output=csv&cachebust=${Date.now()}`;

  const res = await fetch(url, { cache: 'no-store' });

  if (!res.ok) {
    throw new Error(`Sheet fetch failed: ${res.status}`);
  }

  const text = await res.text();

  const rows = text.trim().split('\n').map(r => {
    const cols = [];
    let cur = '';
    let inQ = false;

    for (let i = 0; i < r.length; i++) {
      const c = r[i];

      if (c === '"') {
        inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cols.push(cur.trim());
        cur = '';
      } else {
        cur += c;
      }
    }

    cols.push(cur.trim());
    return cols;
  });

  if (rows.length < 2) {
    throw new Error('Sheet appears empty');
  }

  const headers = rows[0].map(h => cleanVal(h));

  const blklotIdx   = headers.findIndex(h => h.toLowerCase() === BLKLOT_SHT.toLowerCase());
  const statusIdx   = headers.findIndex(h => h.toLowerCase() === STATUS_COL.toLowerCase());
  const addressIdx  = headers.findIndex(h => h.toLowerCase().includes('address'));
  const totalPctIdx = headers.findIndex(h => h.toLowerCase().includes('total percentage'));

  if (blklotIdx === -1) {
    throw new Error(`Column "${BLKLOT_SHT}" not found. Headers: ${headers.join(', ')}`);
  }

  if (statusIdx === -1) {
    throw new Error(`Column "${STATUS_COL}" not found. Headers: ${headers.join(', ')}`);
  }

  const lookup = {};

  let signedCountFromSheet = 0;

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];

    const id = cleanVal(row[blklotIdx]);

    if (!id) continue;

    const rawStatus = cleanVal(row[statusIdx]);
    const status = normalizeStatus(rawStatus);

    const rawPct = totalPctIdx >= 0
      ? cleanVal(row[totalPctIdx]).replace('%', '')
      : '0';

    const totalPct = parseFloat(rawPct) || 0;

    if (status === 'yes') {
      signedCountFromSheet++;
    }

    lookup[id] = {
      rawStatus,
      status,
      address: addressIdx >= 0 ? cleanVal(row[addressIdx]) : '',
      totalPct
    };
  }

  // Compute percentage:
  // numerator = assessment for Yes
  // denominator = assessment for Yes + No + N/A
  // City Property and Pending are excluded from this denominator.
  let numerator = 0;
  let denominator = 0;

  for (const [key, rec] of Object.entries(lookup)) {
    if (key.startsWith('__')) continue;

    const s = rec.status;
    const amt = rec.totalPct;

    if (s === 'yes' || s === 'no' || s === 'n/a') {
      denominator += amt;
    }

    if (s === 'yes') {
      numerator += amt;
    }
  }

  const computedPct = denominator > 0 ? (numerator / denominator) * 100 : 0;

  lookup.__sheetSignedPct   = computedPct;
  lookup.__sheetSignedCount = signedCountFromSheet;

  return lookup;
}

// ── FETCH GEOJSON ────────────────────────────────────────────────────────────
async function fetchGeoJSON() {
  const res = await fetch(GEOJSON_URL);

  if (!res.ok) {
    throw new Error(`GeoJSON fetch failed: ${res.status}`);
  }

  return res.json();
}

// ── PARCEL STATUS HELPER ─────────────────────────────────────────────────────
function getStatus(feature, lookup) {
  const id = cleanVal(feature.properties?.[BLKLOT_GEO]);
  const rec = lookup[resolveLookupId(id)];

  const sheetStatus = rec?.status;
  const geoStatus = normalizeStatus(
    feature.properties?.[STATUS_COL] ||
    feature.properties?.['Ballot Tracking'] ||
    ''
  );

  return sheetStatus || geoStatus || 'pending';
}

function getParcelStyle(status) {
  if (status === 'yes') {
    return {
      fillColor: '#16a34a',
      fillOpacity: 0.7,
      color: '#16a34a',
      weight: 2,
      opacity: 1
    };
  }

  if (status === 'city property') {
    return {
      fillColor: '#16a34a',
      fillOpacity: 0.7,
      color: '#16a34a',
      weight: 2,
      opacity: 1
    };
  }

  if (status === 'no') {
    return {
      fillColor: '#ef4444',
      fillOpacity: 0.45,
      color: '#ef4444',
      weight: 2,
      opacity: 1
    };
  }

  if (status === 'n/a') {
    return {
      fillColor: '#f59e0b',
      fillOpacity: 0.5,
      color: '#d97706',
      weight: 2,
      opacity: 1
    };
  }

  if (status === 'partial') {
    return {
      fillColor: 'url(#hatch-green)',
      fillOpacity: 1,
      color: '#16a34a',
      weight: 2,
      opacity: 1,
      className: 'parcel-partial'
    };
  }

  return {
    fillColor: '#64748b',
    fillOpacity: 0.28,
    color: '#94a3b8',
    weight: 1,
    opacity: 0.75
  };
}

function renderMap(geojson, lookup) {
  if (geojsonLayer) {
    map.removeLayer(geojsonLayer);
  }

  if (!document.getElementById('hatch-svg-defs')) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');

    svg.id = 'hatch-svg-defs';
    svg.setAttribute('style', 'position:absolute;width:0;height:0;overflow:hidden');

    svg.innerHTML = `<defs>
      <pattern id="hatch-green" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
        <line x1="0" y1="0" x2="0" y2="8" stroke="#22c55e" stroke-width="2.5" stroke-opacity="0.9"/>
      </pattern>
    </defs>`;

    document.body.appendChild(svg);
  }

  const boundaryStatuses = {};

  geojson.features.forEach((f) => {
    const coords = JSON.stringify(f.geometry?.coordinates);
    const id = cleanVal(f.properties?.[BLKLOT_GEO]);
    const rec = lookup[resolveLookupId(id)];

    if (rec) {
      const status = rec.status || 'pending';

      if (!boundaryStatuses[coords]) {
        boundaryStatuses[coords] = [];
      }

      boundaryStatuses[coords].push(status);
    }
  });

  let total = 0;

  const signedPct   = lookup.__sheetSignedPct || 0;
  const signedCount = lookup.__sheetSignedCount || 0;

  geojsonLayer = L.geoJSON(geojson, {
    style: feature => {
      const coords = JSON.stringify(feature.geometry?.coordinates);
      const statuses = boundaryStatuses[coords] || [];

      const hasYes = statuses.some(s => s === 'yes');
      const allYes = statuses.length > 0 && statuses.every(s => s === 'yes');

      // Your existing force-green exception.
      const FORCE_FULL_GREEN = new Set(['0261018','0261019','0261020']);
      const FORCE_GREEN_PRIMARY = '0261018';

      const id0 = cleanVal(feature.properties?.[BLKLOT_GEO]);

      const isPartial = !allYes && hasYes && !FORCE_FULL_GREEN.has(id0);

      if (FORCE_FULL_GREEN.has(id0) && id0 !== FORCE_GREEN_PRIMARY) {
        return {
          fillColor: 'transparent',
          fillOpacity: 0,
          color: 'transparent',
          weight: 0,
          opacity: 0
        };
      }

      const effectiveStatus = isPartial ? 'partial' : getStatus(feature, lookup);

      return getParcelStyle(effectiveStatus);
    },

    onEachFeature: (feature, layer) => {
      total++;

      const id = cleanVal(feature.properties?.[BLKLOT_GEO]);
      const rec = lookup[resolveLookupId(id)];
      const status = getStatus(feature, lookup);

      const address =
        cleanVal(feature.properties?.['Site Address']) ||
        rec?.address ||
        '—';

      const ballotVote =
        rec?.rawStatus ||
        cleanVal(feature.properties?.[STATUS_COL]) ||
        cleanVal(feature.properties?.['Ballot Tracking']) ||
        '—';

      const statusBadge =
        status === 'yes'
          ? `<span class="badge badge-yes">Yes</span>`
        : status === 'city property'
          ? `<span class="badge badge-city">City Property</span>`
        : status === 'no'
          ? `<span class="badge badge-no-explicit">No</span>`
        : status === 'n/a'
          ? `<span class="badge badge-na">N/A</span>`
        : `<span class="badge badge-pending">Not yet voted</span>`;

      layer.bindPopup(`
        <div class="popup-header">${resolveLookupId(id)}</div>
        <div class="popup-row">
          <span class="popup-key">Address</span>
          <span class="popup-val">${address}</span>
        </div>
        <div class="popup-row">
          <span class="popup-key">Ballot</span>
          <span class="popup-val">${statusBadge}</span>
        </div>
        <div class="popup-row">
          <span class="popup-key">2026 Ballot</span>
          <span class="popup-val">${ballotVote}</span>
        </div>
      `, { maxWidth: 280 });

      layer.on('mouseover', function() {
        const s = getParcelStyle(status);
        this.setStyle({
          ...s,
          fillOpacity: Math.min((s.fillOpacity || 0.3) + 0.15, 1),
          weight: 2.5
        });
      });

      layer.on('mouseout', function() {
        geojsonLayer.resetStyle(this);
      });
    }
  }).addTo(map);

  map.fitBounds(geojsonLayer.getBounds(), { padding: [24, 24] });

  updateStats(signedCount, total, signedPct);

  const now = new Date().toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  setStatus('live', `Updated ${now}`);
}

// ── MAIN LOAD ─────────────────────────────────────────────────────────────────
async function loadData() {
  setStatus('', 'Loading…');
  setLoading('Loading parcels…');

  try {
    document.getElementById('loadingMsg').textContent = 'Fetching GeoJSON…';

    const [geojson, lookup] = await Promise.all([
      fetchGeoJSON(),
      fetchSheetData()
    ]);

    document.getElementById('loadingMsg').textContent = 'Rendering map…';

    renderMap(geojson, lookup);
    hideLoading();

  } catch (err) {
    hideLoading();
    setStatus('error', 'Load failed');
    showError('Error: ' + err.message);
    console.error(err);
  }
}

loadData();
</script>
